<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>remote thermometer</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./main.js" type="module"></script>
  </head>
  <body>
    <main>
      <header class="head">
        <h1>remote&nbsp;thermometer</h1>
        <button
          class="conn-toggle"
          id="conn-toggle"
          type="button"
          aria-label="connection settings"
          title="connection settings"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3" />
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
        </button>
      </header>

      <div class="conn" id="conn">
        <div class="connect">
          <input
            id="ticket"
            type="text"
            placeholder="paste endpoint ticket"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="connect" type="button" disabled>connect</button>
        </div>
      </div>

      <div class="readings">
        <div class="reading">
          <span id="temp" class="value">—</span><span class="unit">°C</span>
        </div>
        <div class="reading">
          <span id="hum" class="value">—</span><span class="unit">%</span>
        </div>
      </div>

      <p id="status" class="status">loading…</p>
    </main>
  </body>
</html>
