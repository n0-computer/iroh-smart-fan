[build]
target = "xtensa-esp32-espidf"

[target.xtensa-esp32-espidf]
linker = "ldproxy"
runner = "espflash flash --monitor"
rustflags = [ "--cfg",  "espidf_time64"]

[unstable]
build-std = ["std", "panic_abort"]
# SHIPPING-BUILD OPTION: for `panic = "immediate-abort"` (see Cargo.toml), use
# build-std = ["std"] instead (immediate-abort needs no panic_abort runtime).
# Build std/core/alloc with size-first codegen. Behavior-neutral; ~181 KB off
# .flash.text. Keep this on.
build-std-features = ["optimize_for_size"]

[env]
MCU="esp32"
# Note: this variable is not used by the pio builder (`cargo build --features pio`)
ESP_IDF_VERSION = "v5.3.3"

